# Local development: builds image from source
# For Docker Hub pull version, see docker-compose.hub.yml

services:
  viral-move:
    build: .
    container_name: viral-move-agent
    ports:
      - "18789:18789"
    environment:
      # ── Sui ──────────────────────────────────────────────────────
      - SUI_NETWORK=${SUI_NETWORK:-testnet}
      - SUI_PRIVATE_KEY=${SUI_PRIVATE_KEY}   # or use secrets below

      # ── LLM (OpenClaw reads these directly) ──────────────────────
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}

      # ── Telegram ─────────────────────────────────────────────────
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHANNEL_ID=${TELEGRAM_CHANNEL_ID}

      # ── Walrus ───────────────────────────────────────────────────
      - WALRUS_EPOCHS=${WALRUS_EPOCHS:-5}

      # ── OpenClaw dashboard auth token (auto-generated if not set) ─
      - OPENCLAW_AUTH_TOKEN=${OPENCLAW_AUTH_TOKEN:-}

    # Persist generated contracts across restarts.
    # Note: ~/.sui is NOT persisted — Sui config is regenerated from
    # SUI_PRIVATE_KEY on every start by docker-entrypoint.sh.
    volumes:
      - generated-contracts:/home/viral/viral-move/contracts/generated

    # Optional: use Docker secret instead of SUI_PRIVATE_KEY env var
    # secrets:
    #   - sui_private_key

    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  generated-contracts:

