# ─────────────────────────────────────────────────────────────────
#  Viral Move — Docker Hub quick-start
#  Pull a pre-built image and run with just your API keys.
#
#  Usage:
#    1. cp .env.example .env  &&  edit .env
#    2. docker compose -f docker-compose.hub.yml up
#    3. Open http://localhost:18789   (OpenClaw WebChat dashboard)
# ─────────────────────────────────────────────────────────────────

services:
  viral-move:
    image: DOCKERHUB_USERNAME/viral-move:latest   # ← replace with real image name
    container_name: viral-move-agent
    ports:
      - "18789:18789"   # OpenClaw WebChat dashboard
    environment:
      # ── Sui ──────────────────────────────────────────────────────
      - SUI_NETWORK=${SUI_NETWORK:-testnet}
      - SUI_PRIVATE_KEY=${SUI_PRIVATE_KEY}

      # ── LLM — at least one required ──────────────────────────────
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}

      # ── Telegram ─────────────────────────────────────────────────
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHANNEL_ID=${TELEGRAM_CHANNEL_ID}

      # ── Walrus ───────────────────────────────────────────────────
      - WALRUS_EPOCHS=${WALRUS_EPOCHS:-5}

    # Persist Sui client config + generated contracts across restarts
    volumes:
      - sui-config:/home/viral/.sui
      - generated-contracts:/home/viral/viral-move/contracts/generated

    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  sui-config:
  generated-contracts:
